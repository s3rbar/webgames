<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../images/brubik.png">
    <link rel="stylesheet" href="../../dist/index.css">
    <title>Хрестики-нулики</title>
</head>
<body id="tic-tac-toe">
    <aside>
        <a class="home-link" href="../../index.html">
            <img src="../../images/wrubik.png" alt="Logo">
        </a>
        <section>
            <img src="../../images/question.png" alt="Info">
        </section>
    </aside>
    <main>
        <h1>Хрестики-нулики</h1>
        <section class="score">
            Хрестики: <span id="Xcount">0</span> перемог
            <span> | </span>
            Нулики: <span id="Ocount">0</span> перемог
        </section>
        <div class="msg-container hide">
            <h3 id="msg">Winner</h3>
        </div>
        <section class="field">
            <div class="field__square b-right b-bottom">
                <!-- <div class="cross">
                    <div class="l"></div>
                    <div class="r"></div>
                </div> -->
            </div>
            <div class="field__square"></div>
            <div class="field__square"></div>
            <div class="field__square"></div>
            <div class="field__square b-right b-bottom b-top b-left">
                <!-- <div class="circle"></div> -->
            </div>
            <div class="field__square"></div>
            <div class="field__square"></div>
            <div class="field__square"></div>
            <div class="field__square"></div>
        </section>
        <button id="reset" class="reset">Почати спочатку</button>
    </main>
    <script src="../js/tic-tac-toe.js"></script>
</body>
</html>
