<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../images/brubik.png">
    <link rel="stylesheet" href="../../dist/index.css">
    <title>Document</title>
</head>
<body id="snake">
    <aside>
        <a class="home-link" href="../../index.html">
            <img src="../../images/wrubik.png" alt="Logo">
        </a>
        <section>
            <img onclick="toggleRules()" src="../../images/question.png" alt="Info">
        </section>
    </aside>
    <main>
        <h1>Змійка</h1>
        <h2>Рахунок: <span>0</span></h2>
        <h3 class="gameOver"></h3>
        <div id="field"></div>
        <button class="reset">Почати спочатку</button>
    </main>
    <section class="rules hide">
        <div class="top">
            <h3>Правила гри</h3>
            <button onclick="toggleRules()" class="close_rules">Закрити</button>
        </div>
        <ul>
            <li>- Для руку натискайте клавіші стрілочок</li>
            <li>- Змійка зростає після з'їдання яблука</li>
            <li>- Гра виграна, якщо з'їсти 254 яблука</li>
        </ul>
    </section>
    <script src="../js/snake.js"></script>
</body>
</html>
